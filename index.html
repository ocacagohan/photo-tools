<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨LumiGazer+✨</title>

    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            padding: 20px;
            background: #faf5f7;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

h2 {
    margin-bottom: 5px;
    font-size: clamp(24px, 5vw, 32px);
    white-space: nowrap;
}

    .tagline {
    color: #777;
    font-size: 13px;
    margin-bottom: 20px;
    letter-spacing: 1px;
    }

        #preview {
            max-width: 100%;
            margin-top: 20px;
            border-radius: 10px;
            display: none;
        }

        .btn-group {
            margin-top: 20px;
        }

        button {
            width: 100%;
            max-width: 320px;

            padding: 12px 24px;
            margin: 6px;

            font-size: 16px;
            font-weight: bold;

            border: none;
            border-radius: 8px;

            cursor: pointer;
            display: none;

            transition: all 0.2s ease;
        }

        button:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }



        #beautyBtn {
           background: #64b5f6;
           color: white;
        }

        #filterBtn {
            background: #90caf9;
            color: white;
        }

        #instagramBtn {
            background: #c29eda;
            color: white;
        }

        #saveBtn {
            background: #ff69b4;
            color: white;
        }
 
        #resetBtn {
    background: #9e9e9e;
    color: white;
}
    </style>
</head>

<body>

    <div class="container">
        <h2>✨ LumiGazer+ ✨</h2>
        <p class="tagline">Find the light. Shape the mood.</p>


        <input type="file" id="imageInput" accept="image/*">
        <br>

        <img id="preview" alt="プレビュー">

        <div class="btn-group">
            <button id="beautyBtn">💎 Beauty</button>
            <button id="filterBtn">✨ White</button>
            <button id="instagramBtn">📸 Instagram</button>
            <button id="resetBtn">↩ Original</button>
            <button id="saveBtn">💾 写真を保存</button>
        </div>

    </div>





    <script>

        // =========================
        // 要素を取得
        // =========================

        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');

        const filterBtn = document.getElementById('filterBtn');
        const instagramBtn = document.getElementById('instagramBtn');
        const beautyBtn = document.getElementById('beautyBtn');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');

        // =========================
        // 画像保存用
        // =========================

        let originalImage = new Image();
        let currentFilter = "none";


        // =========================
        // 画像読み込み
        // =========================

        imageInput.addEventListener('change', function (e) {

            const file = e.target.files[0];

            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (event) {

                // プレビュー表示
                preview.src = event.target.result;
                preview.style.display = 'block';

                // 自動でプレビューまでスクロール
                preview.scrollIntoView({
                behavior: "smooth"
                });

                // 元画像を保存
                originalImage.src = event.target.result;

                // フィルター初期化
                currentFilter = "none";
                preview.style.filter = currentFilter;

                // ボタン表示
                filterBtn.style.display = 'inline-block';
                instagramBtn.style.display = 'inline-block';    
                beautyBtn.style.display = 'inline-block';
                resetBtn.style.display = 'inline-block';

                // 保存ボタンはまだ隠す
                saveBtn.style.display = 'none';

                // ボタン状態リセット
                resetButtons();

                // 初期状態はOriginal
                resetBtn.innerText = "↩ Original ✓";
                resetBtn.style.background = "#757575";

            };

            reader.readAsDataURL(file);
        });

// =========================
// Beautyモード
// =========================

beautyBtn.addEventListener('click', function() {

    resetButtons();

    currentFilter =
       "brightness(1.15) contrast(0.95) saturate(1.05) blur(0.2px)";

    preview.style.filter = currentFilter;

    beautyBtn.innerText = "💎 Beauty ✓";
    beautyBtn.style.background = "#42a5f5";
    beautyBtn.style.color = "white";
    saveBtn.style.display = 'inline-block';

});

 // =========================
// 美白モード
// =========================

        filterBtn.addEventListener('click', function () {

            resetButtons();

            currentFilter =
            "brightness(1.5) contrast(1.05) saturate(1.05) sepia(0.15) blur(0.3px)";

            preview.style.filter = currentFilter;

            filterBtn.innerText = "✨ White ✓";
            filterBtn.style.background = "#4caf50";
            filterBtn.style.color = "white";

            saveBtn.style.display = 'inline-block';
        });


// =========================
// Instagramモード
// =========================

    instagramBtn.addEventListener('click', function () {
    
        resetButtons();

        currentFilter =
       "brightness(1.1) contrast(1.15) saturate(1.3) sepia(0.15)";

        preview.style.filter = currentFilter;

        instagramBtn.innerText = "📸 Instagram ✓";
        instagramBtn.style.background = "#e1306c";
        instagramBtn.style.color = "white";

        saveBtn.style.display = 'inline-block';

    });


        // =========================
        // 保存
        // =========================

        saveBtn.addEventListener('click', function () {

            // キャンバス作成
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // 元画像サイズ
            //canvas.width = originalImage.naturalWidth;
            //canvas.height = originalImage.naturalHeight;

const maxSize = 1600;

let width = originalImage.naturalWidth;
let height = originalImage.naturalHeight;

if (width > height) {

    if (width > maxSize) {
        height = height * (maxSize / width);
        width = maxSize;
    }

} else {

    if (height > maxSize) {
        width = width * (maxSize / height);
        height = maxSize;
    }
}

canvas.width = width;
canvas.height = height;


            // フィルター適用
            ctx.filter = currentFilter;

            // 画像描画
ctx.drawImage(
    originalImage,
    0,
    0,
    width,
    height
);

// 保存データ作成（品質90%）

const filteredImageUrl =
    canvas.toDataURL('image/jpeg', 0.9);

            // ダウンロード
            const downloadLink = document.createElement('a');

            downloadLink.download =
                'LumiGazer_' + Date.now() + '.jpg';

            downloadLink.href = filteredImageUrl;

            downloadLink.click();


alert("✨ Saved!");

        });


// =========================
// Originalボタンの処理
// =========================
resetBtn.addEventListener('click', function () {

    currentFilter = "none";
    preview.style.filter = "none";

    resetButtons();

    resetBtn.innerText = "↩ Original ✓";
    resetBtn.style.background = "#757575";

saveBtn.style.display = 'inline-block';

});

// =========================
// ボタン状態リセット
// =========================
function resetButtons() {

    beautyBtn.innerText = "💎 Beauty";
    beautyBtn.style.background = "#64b5f6";
    beautyBtn.style.color = "white";

    filterBtn.innerText = "✨ White";
    filterBtn.style.background = "#90caf9";
    filterBtn.style.color = "white";

    instagramBtn.innerText = "📸 Instagram";
    instagramBtn.style.background = "#833ab4";
    instagramBtn.style.color = "white";

    resetBtn.innerText = "↩ Original";
    resetBtn.style.background = "#9e9e9e";
    resetBtn.style.color = "white";
}


</script>

</body>
</html>
